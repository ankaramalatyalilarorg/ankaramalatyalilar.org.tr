<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üye Kayıt Formu</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:#eef2f5;
color:#1f2d3d;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
}

.banner img{
width:100%;
margin-top:12px;
border-radius:18px;
}

.card{
background:#fff;
margin-top:18px;
padding:26px;
border-radius:16px;
border:1px solid #e6e9ee;
}

h2{color:#1e3c2f;margin-bottom:12px;}
h3{margin-top:18px;color:#2f6b57;}

input,select,textarea{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ccc;
border-radius:10px;
}

textarea{height:70px;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

/* ================= İLGİ ALANLARI (DÜZELTİLDİ) ================= */
.interest-section{
margin-top:10px;
}

.interest-item{
margin-top:12px;
padding:10px 0;
border-bottom:1px solid #eee;
}

.interest-item:last-child{
border-bottom:none;
}

.interest-item label{
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
font-size:14px;
}

/* BEYAN */
.beyan{
margin-top:15px;
padding:10px;
background:#f7f9fb;
border-radius:10px;
border:1px solid #ddd;
}

/* BUTTONS */
.actions{
display:flex;
justify-content:center;
gap:12px;
margin-top:20px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-weight:700;
display:flex;
align-items:center;
gap:8px;
}

.btn-send{background:#2f6b57;color:#fff;}
.btn-print{background:#333;color:#fff;}
.btn-pdf{background:#8e44ad;color:#fff;}

</style>
</head>

<body>

<div class="container">

<div class="banner">
<img src="bas.png">
</div>

<form id="form">

<div class="card">

<h2>ÜYE KAYIT FORMU</h2>

<h3>1. Kimlik Bilgileri</h3>
<div class="grid">
<input id="ad" placeholder="Ad Soyad">
<input id="tc" placeholder="T.C. Kimlik Numarası">
<input type="date">
<input placeholder="Doğum Yeri">
</div>

<h3>2. İletişim Bilgileri</h3>
<input id="tel" placeholder="Mobil Telefon">
<input id="mail" placeholder="E-posta">
<textarea placeholder="İkamet Adresi"></textarea>

<!-- ================= İLGİ ALANLARI ================= -->
<h3>3. İlgi Alanları</h3>

<div class="interest-section">

<div class="interest-item">
<label><input type="checkbox"> Kültür etkinlikleri</label>
</div>

<div class="interest-item">
<label><input type="checkbox"> Spor faaliyetleri</label>
</div>

<div class="interest-item">
<label><input type="checkbox"> Girişimcilik</label>
</div>

<div class="interest-item">
<label><input type="checkbox"> Sosyal yardım</label>
</div>

<div class="interest-item">
<label><input type="checkbox"> Diğer</label>
</div>

</div>

<h3>4. Eğitim ve Mesleki Bilgiler</h3>
<select>
<option>İlköğretim</option>
<option>Lise</option>
<option>Üniversite Lisans</option>
<option>Yüksek Lisans</option>
<option>Doktora</option>
</select>

<input placeholder="Meslek / Kurum">

<h3>5. Üyelik Beyanları</h3>

<div class="beyan">
<label><input type="checkbox"> Dernek tüzüğünü okudum ve kabul ediyorum</label>
<label><input type="checkbox"> Üyelik aidatını ödemeyi kabul ediyorum</label>
<label><input type="checkbox"> Verdiğim bilgilerin doğru olduğunu beyan ederim</label>
</div>

</div>

<!-- BUTTONS -->
<div class="actions">

<button class="btn btn-send" type="submit">
<i class="fa-solid fa-envelope"></i> GÖNDER
</button>

<button class="btn btn-pdf" type="button" onclick="pdfOlustur()">
<i class="fa-solid fa-file-pdf"></i> PDF İNDİR
</button>

<button class="btn btn-print" type="button" onclick="window.print()">
<i class="fa-solid fa-print"></i> YAZDIR
</button>

</div>

</form>

</div>

<script>
document.getElementById("form").addEventListener("submit", async function(e){
e.preventDefault();

await fetch("https://formspree.io/f/YOUR_FORM_ID", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
ad: document.getElementById("ad").value,
tc: document.getElementById("tc").value,
tel: document.getElementById("tel").value,
mail: document.getElementById("mail").value
})
});

alert("Başvuru gönderildi.");
});

function pdfOlustur(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.text("ÜYELİK BAŞVURUSU", 10, 10);
doc.text("Ad: " + document.getElementById("ad").value, 10, 20);
doc.text("TC: " + document.getElementById("tc").value, 10, 30);
doc.text("Tel: " + document.getElementById("tel").value, 10, 40);
doc.text("Mail: " + document.getElementById("mail").value, 10, 50);

doc.save("uyelik.pdf");
}
</script>

</body>
</html>
