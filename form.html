<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üye Kayıt Formu</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- PDF KÜTÜPHANESİ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:#eef2f5;
color:#1f2d3d;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
}

.banner img{
width:100%;
margin-top:12px;
border-radius:18px;
}

.card{
background:#fff;
margin-top:18px;
padding:26px;
border-radius:16px;
border:1px solid #e6e9ee;
}

h2{color:#1e3c2f;}
h3{margin-top:18px;color:#2f6b57;}

input,select,textarea{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:10px;
}

textarea{height:80px;resize:none;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.actions{
display:flex;
justify-content:center;
gap:12px;
margin-top:15px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-weight:700;
display:flex;
align-items:center;
gap:8px;
}

.btn-send{
background:linear-gradient(135deg,#1f6feb,#2f6b57);
color:#fff;
}

.btn-pdf{
background:linear-gradient(135deg,#8e44ad,#3498db);
color:#fff;
}

.btn-print{
background:linear-gradient(135deg,#333,#111);
color:#fff;
}

.hidden-area{display:none;margin-top:10px;}
.hidden-area.active{display:block;}

.small-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

</style>
</head>

<body>

<div class="container">

<!-- BANNER -->
<div class="banner">
<img src="bas.png">
</div>

<!-- FORM -->
<form id="form">

<div class="card">
<h2>ÜYE KAYIT FORMU</h2>

<h3>Kimlik</h3>
<input id="ad" placeholder="Ad Soyad">
<input id="tc" placeholder="T.C. Kimlik No">

<h3>İletişim</h3>
<input id="tel" placeholder="Telefon">
<input id="mail" placeholder="E-posta">

<h3>Beyan</h3>
<label>
<input type="checkbox" id="beyanCheck">
Dernek tüzüğünü kabul ediyorum
</label>

<div id="extra" class="hidden-area">
<div class="small-grid">
<input id="onayAd" placeholder="Ad Soyad">
<input type="date" id="onayTarih">
</div>
</div>

</div>

<!-- GÖNDER -->
<div class="actions">
<button class="btn btn-send" type="submit">
<i class="fa-solid fa-envelope"></i> GÖNDER
</button>
</div>

<!-- PDF / PRINT -->
<div class="actions">
<button class="btn btn-pdf" type="button" onclick="downloadPDF()">
<i class="fa-solid fa-file-pdf"></i> PDF İNDİR
</button>

<button class="btn btn-print" type="button" onclick="window.print()">
<i class="fa-solid fa-print"></i> YAZDIR
</button>
</div>

</form>

</div>

<script>
// BEYAN AÇ
document.getElementById("beyanCheck").addEventListener("change", function(){
document.getElementById("extra").classList.toggle("active", this.checked);
});

// EMAIL GÖNDER (FORMSPREE)
document.getElementById("form").addEventListener("submit", async function(e){
e.preventDefault();

const data = {
ad: document.getElementById("ad").value,
tc: document.getElementById("tc").value,
tel: document.getElementById("tel").value,
mail: document.getElementById("mail").value
};

await fetch("https://formspree.io/f/YOUR_FORM_ID", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify(data)
});

alert("Başvuru başarıyla gönderildi.");
});

// PDF İNDİR
function downloadPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.text("ÜYELİK BAŞVURU FORMU", 10, 10);
doc.text("Ad: " + document.getElementById("ad").value, 10, 20);
doc.text("TC: " + document.getElementById("tc").value, 10, 30);
doc.text("Telefon: " + document.getElementById("tel").value, 10, 40);
doc.text("E-posta: " + document.getElementById("mail").value, 10, 50);

doc.save("uyelik_basvuru.pdf");
}

</script>

</body>
</html>
