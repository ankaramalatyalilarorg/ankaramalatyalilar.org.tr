<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üye Kayıt Formu</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:#eef2f5;
color:#1f2d3d;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
}

/* BANNER */
.banner img{
width:100%;
margin-top:12px;
border-radius:18px;
}

/* CARD */
.card{
background:#fff;
margin-top:18px;
padding:26px;
border-radius:16px;
border:1px solid #e6e9ee;
}

h2{color:#1e3c2f;margin-bottom:12px;}
h3{margin-top:18px;color:#2f6b57;font-size:18px;}

/* INPUT */
input,select,textarea{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:10px;
}

textarea{height:80px;resize:none;}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

/* CHECKBOX */
.check label{
display:block;
margin-top:10px;
cursor:pointer;
}

/* ================= BEYAN PANEL ================= */
.beyan-box{
margin-top:15px;
padding:15px;
border-radius:12px;
background:#f6f9fc;
border:1px solid #d8dde6;
}

.hidden-area{
display:none;
margin-top:10px;
}

.hidden-area.active{
display:block;
}

.small-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:10px;
}

/* BUTTONS */
.actions{
display:flex;
justify-content:center;
gap:12px;
margin-top:15px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-weight:700;
display:flex;
align-items:center;
gap:8px;
transition:0.2s;
}

.btn:hover{transform:scale(1.05);}

.btn-send{
background:linear-gradient(135deg,#1f6feb,#2f6b57);
color:#fff;
}

.btn-pdf{
background:linear-gradient(135deg,#8e44ad,#3498db);
color:#fff;
}

.btn-print{
background:linear-gradient(135deg,#333,#111);
color:#fff;
}

/* MOBILE */
@media(max-width:768px){
.grid{grid-template-columns:1fr;}
.small-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

<!-- BANNER -->
<div class="banner">
<img src="bas.png">
</div>

<form>

<div class="card">
<h2>ÜYE KAYIT FORMU</h2>

<h3>1. Kimlik Bilgileri</h3>
<div class="grid">
<input placeholder="Ad Soyad">
<input placeholder="T.C. Kimlik No">
<input type="date">
<input placeholder="Doğum Yeri">
</div>

<h3>2. İletişim</h3>
<input placeholder="Telefon">
<input placeholder="E-posta">
<textarea placeholder="Adres"></textarea>

<h3>3. Eğitim / Meslek</h3>
<input placeholder="Meslek">
<select>
<option>Lise</option>
<option>Lisans</option>
<option>Yüksek Lisans</option>
</select>

<h3>4. Üyelik Beyanları</h3>

<div class="check">
<label><input type="checkbox" id="beyanCheck"> Dernek tüzüğünü okudum ve kabul ediyorum</label>
<label><input type="checkbox"> Üyelik aidatını ödemeyi kabul ediyorum</label>
<label><input type="checkbox"> Verdiğim bilgilerin doğru olduğunu beyan ederim</label>
</div>

<!-- ================= BEYAN AÇILAN ALAN ================= -->
<div id="beyanArea" class="hidden-area">

<div class="small-grid">
<input placeholder="Adı Soyadı">
<input type="date">
</div>

</div>

</div>

<!-- ================= GÖNDER ================= -->
<div class="actions">
<button class="btn btn-send" type="submit">
<i class="fa-solid fa-envelope"></i> GÖNDER
</button>
</div>

<!-- ================= PDF / PRINT ================= -->
<div class="actions">
<button class="btn btn-pdf" type="button">
<i class="fa-solid fa-file-pdf"></i> PDF İNDİR
</button>

<button class="btn btn-print" type="button" onclick="window.print()">
<i class="fa-solid fa-print"></i> YAZDIR
</button>
</div>

</form>

</div>

<!-- ================= SCRIPT ================= -->
<script>
document.getElementById("beyanCheck").addEventListener("change", function(){
let area = document.getElementById("beyanArea");
if(this.checked){
area.classList.add("active");
}else{
area.classList.remove("active");
}
});
</script>

</body>
</html>
