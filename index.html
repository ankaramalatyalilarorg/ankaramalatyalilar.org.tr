<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ankara Malatyalılar Derneği Banner</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #1f2937;
    }

    .wrapper {
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
    }

    .banner {
      width: 100%;
      overflow: hidden;
      border-bottom: 1px solid #e5e7eb;
    }

    .banner img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .menu {
      width: 100%;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 48px;
      padding: 18px 20px;
      border-bottom: 1px solid #e5e7eb;
      flex-wrap: wrap;
    }

    .menu a {
      text-decoration: none;
      color: #111827;
      font-size: 18px;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .menu a:hover {
      color: #b91c1c;
    }

    @media (max-width: 768px) {
      .menu {
        gap: 20px;
        padding: 14px 12px;
      }

      .menu a {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="banner">
      <img src="banneryeni.png" alt="Ankara Malatyalılar Derneği Banner" />
    </div>

    <nav class="menu">
      <a href="#">Ana Sayfa</a>
      <a href="#">Faaliyetlerimiz</a>
      <a href="#">Projeler</a>
      <a href="#">İletişim</a>
    </nav>
  </div>
</body>
</html>
