<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üyelik | Ankara Malatyalılar Derneği</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial, Helvetica, sans-serif;
background:#eef2f5;
color:#1f2d3d;
}

.container{
width:95%;
max-width:1300px;
margin:auto;
}

/* HEADER */
header{margin-top:10px;}

.banner-box{
border-radius:18px 18px 0 0;
overflow:hidden;
}

.banner-box img{width:100%;}

/* NAV */
nav{
background:#2f6b57;
border-radius:0 0 18px 18px;
}

nav ul{
display:flex;
gap:55px;
padding:14px 30px;
list-style:none;
flex-wrap:wrap;
}

nav a{
color:#fff;
text-decoration:none;
font-size:15px;
}

/* HERO */
.hero{
margin-top:10px;
background:linear-gradient(135deg,#2f6b57,#4ea07f);
color:#fff;
padding:25px;
border-radius:18px;
}

.hero h1{font-size:34px;}
.hero p{font-size:16px;}

/* CARD */
.card{
background:#fff;
border-radius:16px;
padding:18px;
margin-top:10px;
border:1px solid #e6e9ee;
}

/* ===== ONAY KUTULARI (İNCE TASARIM) ===== */

.checklist{
margin-top:10px;
display:flex;
flex-direction:column;
gap:6px;
}

/* ÇOK İNCE UZUN KUTU */
.check-box{
display:flex;
align-items:center;
gap:10px;

width:100%;
padding:6px 12px;   /* 🔥 yükseklik ciddi küçüldü */
border:1px solid #2f6b57;
border-radius:8px;

background:#f9fffc;
}

/* checkbox */
.check-box input{
transform:scale(1.1);
cursor:pointer;
flex-shrink:0;
margin:0;
}

/* yazı */
.check-box span{
font-size:14px;
line-height:1.2;
}

/* BUTTON */
.actions{
text-align:center;
margin-top:12px;
}

button{cursor:pointer;border:none;}

.btn-submit{
background:#2f6b57;
color:#fff;
padding:10px 22px;
border-radius:8px;
font-weight:600;
}

.btn-print{
background:#333;
color:#fff;
padding:8px 16px;
border-radius:8px;
margin-bottom:6px;
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:26px;}
}
</style>
</head>

<body>

<header class="container">
<div class="banner-box">
<img src="bas.png">
</div>

<nav>
<ul>
<li><a href="index.html">Ana Sayfa</a></li>
<li><a href="kurumsal.html">Kurumsal</a></li>
<li><a href="faaliyet.html">Faaliyetler</a></li>
<li><a href="proje.html">Projeler</a></li>
<li><a href="blog.html">Blog</a></li>
<li><a href="uyelik.html" class="active">Üyelik</a></li>
<li><a href="iletisim.html">İletişim</a></li>
</ul>
</nav>
</header>

<section class="hero container">
<h1>Üyelik Başvurusu</h1>
<p>Derneğimize katılarak dayanışma ve hemşehrilik bağlarını güçlendirin.</p>
</section>

<main class="container">

<div class="card">
<h2>Onay ve Beyan</h2>

<div class="checklist">

<label class="check-box">
<input type="checkbox">
<span>Girdiğim tüm bilgilerin doğru olduğunu beyan ederim.</span>
</label>

<label class="check-box">
<input type="checkbox">
<span>Dernek tüzüğünü okudum ve kabul ediyorum.</span>
</label>

<label class="check-box">
<input type="checkbox">
<span>Üyelik şartlarını eksiksiz olarak kabul ediyorum.</span>
</label>

</div>

<div class="actions">
<button class="btn-print" type="button" onclick="window.print()">Yazdır</button><br>
<button class="btn-submit" type="submit">Gönder</button>
</div>

</div>

</main>

</body>
</html>
