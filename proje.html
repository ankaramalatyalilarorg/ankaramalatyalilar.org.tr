<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proje Duyuruları | Ankara Malatyalılar Derneği</title>
  <style>
    :root{
      --primary:#7a0019;
      --secondary:#a61b3f;
      --accent:#f7f1f3;
      --text:#222;
      --muted:#666;
      --white:#fff;
      --border:#e6d9de;
      --success:#eaf7ed;
      --warning:#fff6e6;
      --info:#eef5ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      background:#fafafa;
      line-height:1.6;
    }
    .container{
      width:min(1200px, 92%);
      margin:0 auto;
    }
    .hero{
      background:linear-gradient(135deg, var(--primary), var(--secondary));
      color:#fff;
      padding:56px 0;
    }
    .hero h1{
      margin:0 0 16px;
      font-size:38px;
      line-height:1.15;
    }
    .hero p{
      margin:0;
      max-width:900px;
      font-size:18px;
      opacity:.96;
    }
    .section{
      padding:42px 0;
    }
    .section h2{
      font-size:30px;
      margin:0 0 16px;
      color:var(--primary);
    }
    .lead-box{
      background:var(--white);
      border:1px solid var(--border);
      border-left:6px solid var(--primary);
      border-radius:14px;
      padding:24px;
      box-shadow:0 8px 24px rgba(0,0,0,.04);
    }
    .lead-box p{
      margin:0 0 14px;
    }
    .lead-box p:last-child{
      margin-bottom:0;
    }
    .highlight{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
      margin-top:22px;
    }
    .card{
      background:var(--white);
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
      box-shadow:0 8px 20px rgba(0,0,0,.04);
    }
    .card h3{
      margin:0 0 8px;
      font-size:18px;
      color:var(--primary);
    }
    .notice{
      margin-top:18px;
      padding:16px 18px;
      border-radius:12px;
      background:var(--warning);
      border:1px solid #f1d48a;
      font-weight:600;
    }
    .table-wrap{
      overflow:auto;
      background:var(--white);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:0 8px 24px rgba(0,0,0,.04);
    }
    table{
      width:100%;
      border-collapse:collapse;
      min-width:1100px;
    }
    th, td{
      padding:14px 12px;
      border-bottom:1px solid #eee;
      text-align:left;
      vertical-align:top;
      font-size:15px;
    }
    th{
      background:#f8eef1;
      color:var(--primary);
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:.3px;
    }
    tr:hover td{
      background:#fcfbfc;
    }
    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }
    .badge-open{ background:var(--success); color:#116633; }
    .badge-soon{ background:var(--info); color:#114b9b; }
    .badge-follow{ background:#f1f1f1; color:#444; }
    a.btn{
      display:inline-block;
      text-decoration:none;
      background:var(--primary);
      color:#fff;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
      transition:.2s ease;
    }
    a.btn:hover{
      background:var(--secondary);
    }
    .cta{
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:26px;
      text-align:center;
      box-shadow:0 8px 24px rgba(0,0,0,.04);
    }
    .cta h3{
      margin:0 0 10px;
      font-size:28px;
      color:var(--primary);
    }
    .cta p{
      max-width:850px;
      margin:0 auto 18px;
      color:var(--muted);
    }
    footer{
      background:#f4f4f4;
      color:#555;
      padding:24px 0 40px;
      font-size:14px;
    }
    .small{
      color:var(--muted);
      font-size:14px;
    }
    @media (max-width:768px){
      .hero h1{font-size:30px}
      .hero p{font-size:16px}
      .section h2{font-size:24px}
    }
  </style>
</head>
